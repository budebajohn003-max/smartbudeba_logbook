<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 25px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }

        .filter-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            align-items: flex-end;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: #7f8c8d;
            margin-bottom: 8px;
        }

        input[type="date"], select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 15px;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="date"]:focus, select:focus {
            border-color: #3498db;
        }

        .search-btn {
            background-color: #3498db;
            color: white;
            padding: 11px 20px;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .search-btn:hover {
            background-color: #2980b9;
        }

        /* Placeholder for results */
        .results-section {
            border: 2px dashed #bdc3c7;
            border-radius: 6px;
            padding: 40px;
            color: #333;
            background: #fafbfc;
            min-height: 240px;
            transition: background 0.2s ease;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .result-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 18px 20px;
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.04);
        }

        .result-card h3 {
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
        }

        .result-card p {
            font-size: 28px;
            font-weight: 700;
            color: #111827;
            margin: 0;
        }

        .report-section {
            margin-top: 20px;
        }

        .report-section h4 {
            margin-bottom: 12px;
            font-size: 16px;
            color: #1f2937;
        }

        .report-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            background: #fff;
        }

        .stat-row span {
            color: #475569;
            font-size: 14px;
        }

        .stat-row strong {
            color: #111827;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Reports Title at the Top -->
    <h1>Reports</h1>

    <!-- Filter Controls Downward -->
    <form class="filter-form" id="reportForm">
        <!-- From Date -->
        <div class="form-group">
            <label for="fromDate">From Date</label>
            <input type="date" id="fromDate" name="fromDate" required>
        </div>

        <!-- To Date -->
        <div class="form-group">
            <label for="toDate">To Date</label>
            <input type="date" id="toDate" name="toDate" required>
        </div>

        <!-- Report Type -->
        <div class="form-group">
            <label for="reportType">Report Type</label>
            <select id="reportType" name="reportType" required>
                <option value="">-- Select Type --</option>
                <option value="logbook_volume">Logbook Volume</option>
                <option value="status_breakdown">Status Breakdown</option>
                <option value="activity_summary">Activity Summary</option>
                <option value="monthly_trends">Monthly Trends</option>
            </select>
        </div>

        <!-- Search Button -->
        <button type="submit" class="search-btn">SEARCH</button>
    </form>

    <!-- Results Placeholder -->
    <div class="results-section" id="resultsPlaceholder">
        Your search results will appear here...
    </div>
</div>

<script type="module" src="./reports.js"></script>

</body>
</html>
