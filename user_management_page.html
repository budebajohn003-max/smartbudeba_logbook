<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Manage Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div class="max-w-6xl mx-auto p-6">
        <!-- Header Section -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Manage Users</h1>
                <p class="text-sm text-gray-500">Overview of system users and permissions.</p>
            </div>
            <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition shadow-sm">
                + Add New User
            </button>
        </div>

        <!-- Horizontal Role Selector (Navigation Tabs) -->
        <div class="border-b border-gray-200 mb-6">
            <nav class="flex space-x-8" aria-label="Tabs">
                <button onclick="switchTab('students')" id="tab-students" class="border-blue-500 text-blue-600 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm transition">
                    Students <span class="ml-2 bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full text-xs font-semibold">1,240</span>
                </button>
                <button onclick="switchTab('supervisors')" id="tab-supervisors" class="border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm transition">
                    Supervisors <span class="ml-2 bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full text-xs font-semibold">45</span>
                </button>
                <button onclick="switchTab('admins')" id="tab-admins" class="border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm transition">
                    Admins <span class="ml-2 bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full text-xs font-semibold">6</span>
                </button>
            </nav>
        </div>

        <!-- User Management Table Container -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200 text-xs font-semibold text-gray-600 uppercase tracking-wider">
                            <th class="px-6 py-4">Name</th>
                            <th class="px-6 py-4">Email</th>
                            <th class="px-6 py-4">Role</th>
                            <th class="px-6 py-4 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-100 text-sm text-gray-700">
                        <!-- Data will be dynamically injected here via JavaScript -->
                    </tbody>
                </table>
            </div>
            
            <!-- Table Footer / Pagination -->
            <div class="bg-white px-6 py-4 border-t border-gray-200 flex items-center justify-between">
                <span class="text-sm text-gray-500">Showing 1 to 3 of users</span>
                <div class="flex space-x-2">
                    <button class="px-3 py-1 border border-gray-300 rounded text-sm disabled:opacity-50" disabled>Previous</button>
                    <button class="px-3 py-1 border border-gray-300 rounded text-sm hover:bg-gray-50">Next</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Simple JS script to toggle the data and maintain horizontal layout state -->
    <script>
        const userData = {
            students: [
                { name: "Jane Doe", email: "jane.doe@university.edu", role: "Student" },
                { name: "Alex Smith", email: "alex.smith@university.edu", role: "Student" }
            ],
            supervisors: [
                { name: "Dr. Sarah Jenkins", email: "s.jenkins@university.edu", role: "Supervisor" },
                { name: "Prof. Alan Turing", email: "a.turing@university.edu", role: "Supervisor" }
            ],
            admins: [
                { name: "Admin Chief", email: "admin.root@university.edu", role: "Admin" }
            ]
        };

        function renderTable(roleKey) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            userData[roleKey].forEach(user => {
                const row = `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="px-6 py-4 font-medium text-gray-900">${user.name}</td>
                        <td class="px-6 py-4 text-gray-500">${user.email}</td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium 
                                ${roleKey === 'admins' ? 'bg-purple-100 text-purple-800' : roleKey === 'supervisors' ? 'bg-green-100 text-green-800' : 'bg-blue-100 text-blue-800'}">
                                ${user.role}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right space-x-3">
                            <button class="text-blue-600 hover:text-blue-900 font-medium">Edit</button>
                            <button class="text-red-600 hover:text-red-900 font-medium">Delete</button>
                        </td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        function switchTab(roleKey) {
            // Update Tab styles
            const tabs = ['students', 'supervisors', 'admins'];
            tabs.forEach(tab => {
                const el = document.getElementById(`tab-${tab}`);
                if (tab === roleKey) {
                    el.className = "border-blue-500 text-blue-600 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm transition";
                } else {
                    el.className = "border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm transition";
                }
            });

            // Re-render data
            renderTable(roleKey);
        }

        // Initialize with students visible
        renderTable('students');
    </script>
</body>
</html>
